name: Build and Deploy
on:
  push:
    branches:
      - upgrade-netex-2.0_for_1.x
  pull_request:
    branches:
      - upgrade-netex-2.0_for_1.x
jobs:
  maven-verify:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install xmlstarlet
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get update
          sudo apt-get -y install xmlstarlet
      - uses: actions/setup-java@v4
        with:
          java-version: 8
          distribution: temurin
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
            ${{ runner.os }}-maven-
            ${{ runner.os }}-

      - name: Get version from pom.xml
        id: get-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Run maven build
        run: mvn package

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: build-artifacts
          path: target/*.jar

  publish-snapshot:
    name: Publish snapshot to Maven Central
    if: github.repository_owner == 'entur' && github.event_name == 'push' && github.ref == 'refs/heads/upgrade-netex-2.0_for_1.x'
    needs: maven-verify
    uses: ./.github/workflows/maven-jreleaser-release.yml
    with:
      version: ${{ needs.maven-verify.outputs.version }}
      snapshot: true
      skip_version_update: true
      java_version: 8
      java_distribution: temurin
    secrets: inherit
